<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTask - Login</title>
    <link rel="stylesheet" href="styles3.css">
</head>
<body>
    <div class="login-container">
        <h2>Welcome Back!</h2>
        <p class="subtitle">Log in to explore opportunities</p>
        <form action="#" method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <input type="password" name="password" placeholder="Enter your password" required>
            <button type="submit" class="btn">Login</button>
        </form>
        <p class="links"><a href="#">Forgot Password?</a></p>
        <p class="links">Don't have an account? <a href="http://127.0.0.1:5500/QT/index2.html">Sign up now</a></p>
    </div>
</body>
</html>
