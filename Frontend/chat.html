<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbox - QuickTask</title>
    <link rel="stylesheet" href="chatbox.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <img src="https://via.placeholder.com/40" alt="User" class="user-img">
            <p class="chat-user-name">Employer Name</p>
        </div>
        
        <div class="chat-box">
            <div class="message received">Hello, I need help with home cleaning.</div>
            <div class="message sent">Sure! When would you like the service?</div>
            <div class="message received">Tomorrow at 10 AM.</div>
            <div class="message sent">Got it! I'll be there on time.</div>
        </div>

        <div class="chat-input">
            <input type="text" placeholder="Type a message..." id="messageInput">
            <button id="sendBtn">Send</button>
        </div>
    </div>
</body>
</html>
