<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Profile - QuickTask</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <img src="https://via.placeholder.com/80" alt="Profile Picture" class="profile-pic">
            <div class="profile-details">
                <p class="profile-name">John Doe</p>
                <p class="profile-bio">Tasker | Freelancer | Helping people get things done!</p>
            </div>
        </div>
        <div class="profile-stats">
            <div>
                <span>15</span>
                Tasks Completed
            </div>
            <div>
                <span>4.8</span>
                Rating
            </div>
            <div>
                <span>3</span>
                Ongoing Tasks
            </div>
        </div>
        <button class="edit-profile">Edit Profile</button>
        <div class="task-grid">
            <img src="https://via.placeholder.com/100" alt="Task 1">
            <img src="https://via.placeholder.com/100" alt="Task 2">
            <img src="https://via.placeholder.com/100" alt="Task 3">
            <img src="https://via.placeholder.com/100" alt="Task 4">
            <img src="https://via.placeholder.com/100" alt="Task 5">
            <img src="https://via.placeholder.com/100" alt="Task 6">
        </div>
        <button class="logout-button">Logout</button>
    </div>
</body>
</html>
